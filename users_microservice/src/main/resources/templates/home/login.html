<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alcohol Agent - Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
          --black: #000;
          --light-orange: #ffb74d;
          --light-green: #81c784;
          --focus-green: #4caf50;
          --light-grey: #f8f9fa;
          --nav-height: 70px;
        }

        body {
          font-family: 'Space Grotesk', sans-serif;
          padding-top: var(--nav-height);
        }

        nav {
          border-bottom: 3px solid var(--black);
          background: #fff;
        }

        .nav-link {
          color: var(--black) !important;
          position: relative;
        }

        .nav-link::after {
          content: '';
          position: absolute;
          bottom: 0;
          left: 5%;
          width: 0;
          height: 3px;
          background: var(--light-green);
          transition: .35s;
        }

        .nav-link.active::after,
        .nav-link:hover::after {
          width: 90%;
        }

        .hero {
          min-height: 40vh;
          display: flex;
          align-items: center;
          justify-content: center;
          border-bottom: 4px solid var(--black);
          margin-bottom: 3rem;
          text-align: center;
        }

        .section-grey {
          border: 2px solid var(--black);
          border-radius: 12px;
          background: var(--light-grey);
          max-width: 600px;
          margin: auto;
          padding: 2rem;
          margin-bottom: 3rem; /* ensures footer doesn't touch */
        }

        .btn-primary-custom {
          background: var(--black);
          color: #fff;
          border: 2px solid var(--black);
          font-weight: 600;
        }

        .btn-primary-custom:hover {
          background: var(--light-orange);
          color: #222;
          border-color: var(--light-orange);
        }

        /* Keep custom button green instead of Bootstrap blue when clicked */
        .btn-primary-custom:active,
        .btn-primary-custom.active,
        .show > .btn-primary-custom.dropdown-toggle {
          background-color: var(--focus-green) !important;
          color: #fff !important;
          border-color: var(--focus-green) !important;
          box-shadow: 0 0 0 0.25rem rgba(76, 175, 80, 0.4) !important;
        }

        /* Input fields: green border & glow when focused */
        .form-control:focus {
          border-color: var(--focus-green) !important;
          box-shadow: 0 0 0 0.25rem rgba(76, 175, 80, 0.25) !important;
          outline: none;
        }

        footer {
          background: var(--light-grey);
          border-top: 4px solid var(--black);
          text-align: center;
          padding: 3rem 2rem 2rem;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="registration.html">Alcohol Agent</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="registration.html">Register</a></li>
                <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="#">About</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <div class="container">
        <h1 class="fw-bold">Welcome Back</h1>
        <p class="lead">Login to continue your journey with Alcohol Agent.</p>
    </div>
</section>

<!-- Login Form -->
<section>
    <div class="section-grey">
        <h2 class="mb-4 text-center">Login Form</h2>
        <form>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary-custom w-100">Login</button>
            <div class="text-center mt-3">
                <a href="#" class="text-decoration-none">Forgot Password?</a>
            </div>
        </form>
    </div>
</section>

<!-- Footer -->
<footer>
    <p>&copy; 2026 Alcohol Agent. All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
