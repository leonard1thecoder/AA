<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alcohol Agent - Reset Password</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global-styles.css">
<link rel="stylesheet" href="/css/reset-password-style.css">
</head>
<body>



<!-- Hero -->
<section class="hero">
    <div class="container">
        <h1 class="fw-bold">Reset Your Password</h1>
        <p class="lead">Enter a new password to secure your account.</p>
    </div>
</section>

<!-- Reset Password Form (with id and alerts) -->
<section>
  <div class="section-grey">
    <h2 class="mb-4 text-center">Reset Password</h2>

    <div id="errorAlert"   class="alert alert-danger d-none" role="alert"></div>
    <div id="successAlert" class="alert alert-success d-none" role="alert"></div>

    <form id="resetPasswordForm">
      <div class="mb-3">
        <label for="newPassword" class="form-label">New Password</label>
        <input 
          type="password" 
          class="form-control" 
          id="newPassword" 
          placeholder="Enter new password" 
          
          minlength="8" 
		  required
        >
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm New Password</label>
        <input 
          type="password" 
          class="form-control" 
          id="confirmPassword" 
          placeholder="Confirm new password" 
          required
        >
      </div>

      <button type="submit" class="btn btn-primary-custom w-100">
        Update Password
      </button>

      <div class="text-center mt-3">
        <a href="/login" class="text-decoration-none">Back to Login</a>
      </div>
    </form>
  </div>
</section>

<!-- Footer -->
<footer>
    <p>&copy; 2026 Alcohol Agent. All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/reset-password.js"></script>

</body>
</html>
