<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alcohol Agent - Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
     --black: #000;
     --light-orange: #ffb74d;
     --light-green: #81c784;
     --focus-green: #4caf50;
     --light-grey: #f8f9fa;
     --nav-height: 70px;
   }

   body {
     font-family: 'Space Grotesk', sans-serif;
     padding-top: var(--nav-height);
   }

   nav {
     border-bottom: 3px solid var(--black);
     background: #fff;
   }

   .nav-link {
     color: var(--black) !important;
     position: relative;
   }

   .nav-link::after {
     content: '';
     position: absolute;
     bottom: 0;
     left: 5%;
     width: 0;
     height: 3px;
     background: var(--light-green);
     transition: .35s;
   }

   .nav-link.active::after,
   .nav-link:hover::after {
     width: 90%;
   }

   .hero {
     min-height: 40vh;
     display: flex;
     align-items: center;
     justify-content: center;
     border-bottom: 4px solid var(--black);
     margin-bottom: 3rem;
     text-align: center;
   }

   .section-grey {
     border: 2px solid var(--black);
     border-radius: 12px;
     background: var(--light-grey);
     max-width: 800px;
     margin: auto;
     padding: 2rem;
   }

   .btn-primary-custom {
     background: var(--black);
     color: #fff;
     border: 2px solid var(--black);
     font-weight: 600;
   }

   .btn-primary-custom:hover {
     background: var(--light-orange);
     color: #222;
     border-color: var(--light-orange);
   }

   footer {
     background: var(--light-grey);
     border-top: 4px solid var(--black);
     text-align: center;
     padding: 2rem;
   }
    </style>
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="registration.html">Alcohol Agent</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" href="/sign-up">Register</a></li>
                <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <div class="container">
        <h1 class="fw-bold">Create Your Account</h1>
        <p class="lead">Join Alcohol Agent today and start exploring responsibly.</p>
    </div>
</section>

<!-- Registration Form -->
<section>
    <div class="section-grey">
        <h2 class="mb-4 text-center">Registration Form</h2>
        <form>
            <div class="mb-3"><label class="form-label">Username</label><input type="text" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Confirm Password</label><input type="password" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Date of Birth</label><input type="date" class="form-control" required></div>
            <button type="submit" class="btn btn-primary-custom w-100">Register</button>
        </form>
    </div>
</section>

<footer><p>&copy; 2026 Alcohol Agent. All rights reserved.</p></footer>
</body>
</html>
