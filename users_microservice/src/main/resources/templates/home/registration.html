<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alcohol Agent - Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
     <link rel="stylesheet" href="/css/global-styles.css">
     <link rel="stylesheet" href="/css/sign-up.css">


</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="registration.html">Alcohol Agent</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link active" href="/sign-up">Register</a></li>
                <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <div class="container">
        <h1 class="fw-bold">Create Your Account</h1>
        <p class="lead">Join Alcohol Agent today and start exploring responsibly.</p>
    </div>
</section>

<!-- Registration Form -->
<section>
    <div class="section-grey">
        <h2 class="mb-4 text-center">Registration Form</h2>

        <!-- Alert for success/error -->
        <div id="registerAlert" class="alert d-none mb-3" role="alert"></div>

        <form id="registerForm">
            <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="cellphone" class="form-label">Cellphone Number</label>
                <input type="tel" class="form-control" id="cellphone" required>
            </div>
            <div class="mb-3">
                <label for="identityNo" class="form-label">Identity Number</label>
                <input type="text" class="form-control" id="identityNo" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
           
            <!-- Privileges Dropdown -->
            <div class="mb-3">
                <label for="privileges" class="form-label">Select Alcohol Agent Type</label>
                <select class="form-select" id="privileges" name="privileges" required>
                    <option value="" disabled selected>Loading privileges...</option>
                </select>
            </div>

            <!-- Optional hidden ID (usually not needed for registration) -->
            <input type="hidden" id="id" value="">

            <button type="submit" class="btn btn-primary-custom w-100" id="registerBtn">Register</button>
        </form>
    </div>
</section>


<footer><p>&copy; 2026 Alcohol Agent. All rights reserved.</p></footer>

<script src="/js/register.js"></script>

</body>
</html>
