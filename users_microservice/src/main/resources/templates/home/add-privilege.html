<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Alcohol Agent - Login</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/global-styles.css">
    <link rel="stylesheet" href="/css/reset-password-style.css">


</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="registration.html">Alcohol Agent</a>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="/sign-up">Register</a></li>
                <li class="nav-item"><a class="nav-link active" href="/login">Login</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Hero -->
<section class="hero">
    <div class="container">
        <h1 class="fw-bold">Welcome Back</h1>
        <p class="lead">Login to continue your journey with Alcohol Agent.</p>
    </div>
</section>

<section>
    <div class="section-grey">
        <h2 class="mb-4 text-center">Add New Privilege</h2>

        <!-- Alert messages (success / error) -->
        <div id="privilegeAlert" class="alert d-none mb-4" role="alert"></div>

        <form id="addPrivilegeForm">
            <div class="mb-3">
                <label for="privilegeName" class="form-label">Privilege Name</label>
                <input 
                    type="text" 
                    class="form-control" 
                    id="privilegeName" 
                    placeholder="e.g. ADMIN, MODERATOR, VIEWER" 
                    required 
                    maxlength="50">
                <div class="form-text text-muted">
                    Unique name for the privilege/role (will be displayed in dropdowns)
                </div>
            </div>


            <button type="submit" class="btn btn-primary-custom w-100 mt-3" id="submitBtn">
                Create Privilege
            </button>
        </form>
    </div>
</section>
<!-- Footer -->
<footer>
    <p>&copy; 2026 Alcohol Agent. All rights reserved.</p>
</footer>

<!-- Bootstrap JS -->
<script src="/js/Privilege-script.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
